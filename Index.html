<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RozKamao Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'SF Pro Display', -apple-system, Roboto, Helvetica, sans-serif;
        }
        body {
            background: radial-gradient(circle at top, #0c1b24 0%, #050b10 100%);
            color: #ffffff;
            padding: 16px;
            padding-bottom: 90px;
            min-height: 100vh;
        }
        
        /* Top Navigation Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .app-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-contributor {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: #00f2fe;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Hero Main Balance Card */
        .main-card {
            background: linear-gradient(145deg, rgba(16, 37, 49, 0.7) 0%, rgba(7, 15, 22, 0.9) 100%);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.5);
            position: relative;
        }
        .user-tag {
            font-size: 13px;
            color: #7085a0;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .username {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .balance-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7085a0;
            font-weight: 600;
        }
        .balance-amount {
            font-size: 46px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffcc 0%, #00aaff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 6px 0 20px 0;
            filter: drop-shadow(0 4px 12px rgba(0, 255, 204, 0.2));
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 16px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #a0aec0;
        }
        .stat-val {
            font-weight: 700;
            color: #ffffff;
        }

        /* Mega Ads Button Trigger */
        .ad-trigger-btn {
            width: 100%;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            padding: 20px;
            border-radius: 18px;
            color: #050b10;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.25);
            margin-bottom: 28px;
            transition: transform 0.2s;
        }
        .ad-trigger-btn:active {
            transform: scale(0.98);
        }
        .ad-trigger-btn:disabled {
            background: #15222e;
            color: #4a5d6e;
            box-shadow: none;
            cursor: not-allowed;
        }
        .badge-reward {
            background: rgba(5, 11, 16, 0.8);
            color: #00f2fe;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
        }

        /* Streamlined Tasks/Opportunities Section */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7085a0;
            margin-bottom: 14px;
        }
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .task-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .task-icon {
            width: 44px;
            height: 44px;
            background: rgba(0, 242, 254, 0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #00f2fe;
        }
        .task-name {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }
        .task-reward {
            font-size: 12px;
            color: #00ffcc;
            font-weight: 500;
        }
        .task-action-btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50px;
            color: #00f2fe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* High-End Bottom Floating Navigation */
        .nav-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(7, 15, 22, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #526882;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-item.active {
            color: #00f2fe;
        }
        .nav-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.2s;
        }
        .nav-item:active svg {
            transform: scale(0.85);
        }
    </style>
</head>
<body>

    <!-- Top Status Header -->
    <div class="top-bar">
        <div class="app-logo">
            <span>⚡</span> Earn Tasks
        </div>
        <div class="top-contributor">Top Contributor</div>
    </div>

    <!-- Main Dashboard Card -->
    <div class="main-card">
        <div class="user-tag">Secure Connection:</div>
        <div class="username" id="user-display">@ASHH4X</div>
        
        <div class="balance-label">Current Balance</div>
        <div class="balance-amount" id="balance-display">₹0</div>
        
        <div class="stats-grid">
            <div class="stat-item"><span>Total Earned:</span><span class="stat-val" id="total-earned">₹0</span></div>
            <div class="stat-item"><span>Ads Watched:</span><span class="stat-val" id="ads-count">0</span></div>
        </div>
    </div>

    <!-- Main Rewarded Ad Action Trigger -->
    <button class="ad-trigger-btn" id="watch-ad-btn" onclick="showRewardAd()">
        <span style="display:flex; align-items:center; gap:10px;">🎬 X-Ad Verification</span>
        <span class="badge-reward">₹5</span>
    </button>

    <!-- Extra Earning Streams List -->
    <div class="section-title">Streamlined Opportunities</div>
    <div class="task-list">
        <div class="task-card">
            <div class="task-info">
                <div class="task-icon">🔗</div>
                <div>
                    <div class="task-name">X-Link Referral</div>
                    <div class="task-reward">Earn ₹10 per active link</div>
                </div>
            </div>
            <button class="task-action-btn">➔</button>
        </div>
        <div class="task-card">
            <div class="task-info">
                <div class="task-icon">🤝</div>
                <div>
                    <div class="task-name">Secure Community</div>
                    <div class="task-reward">Earn ₹20 Joining Reward</div>
                </div>
            </div>
            <button class="task-action-btn">➔</button>
        </div>
    </div>

    <!-- Bottom Elite Navigation Dock -->
    <div class="nav-dock">
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Explore</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2zm0 8H7v-2h10v2z"/></svg>
            <span>Missions</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Network</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>Vault</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id.toString() : "12345678";
        const usernameText = user ? (user.username ? '@' + user.username : user.first_name) : "@ASHH4X";
        
        document.getElementById("user-display").innerText = usernameText;
        
        const BACKEND_URL = "https://rozkamao-backend.onrender.com";
        const AdController = window.Adsgram.init({ blockId: "38196" });

        async function loadUserBalance() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/user?user_id=${userId}`);
                const data = await response.json();
                if (data && data.balance !== undefined) {
                    document.getElementById("balance-display").innerText = "₹" + data.balance;
                    document.getElementById("total-earned").innerText = "₹" + (data.total_earned || data.balance);
                    document.getElementById("ads-count").innerText = data.ads_watched || "0";
                }
            } catch (e) { console.error(e); }
        }

        function showRewardAd() {
            const btn = document.getElementById("watch-ad-btn");
            btn.disabled = true;
            
            AdController.show()
                .then(async () => {
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    try {
                        const response = await fetch(`${BACKEND_URL}/api/user?user_id=${userId}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ add_balance: 5 }) // Set back to ₹5
                        });
                        const updatedData = await response.json();
                        document.getElementById("balance-display").innerText = "₹" + updatedData.balance;
                        document.getElementById("total-earned").innerText = "₹" + (updatedData.total_earned || updatedData.balance);
                        document.getElementById("ads-count").innerText = updatedData.ads_watched || "0";
                    } catch (err) { console.error(err); }
                    btn.disabled = false;
                })
                .catch((err) => {
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                    btn.disabled = false;
                });
        }
        
        loadUserBalance();
    </script>
</body>
</html>
