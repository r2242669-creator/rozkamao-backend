<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RozKamao Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: sans-serif; }
        body { background: #050b10; color: #ffffff; padding: 16px; min-height: 100vh; }
        .main-card { background: #102531; border: 1px solid #00f2fe; border-radius: 24px; padding: 24px; margin-bottom: 20px; }
        .username { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .balance-amount { font-size: 38px; font-weight: 900; color: #00ffcc; margin: 6px 0; }
        .ad-trigger-btn { width: 100%; background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; padding: 20px; border-radius: 18px; color: #050b10; font-size: 16px; font-weight: 800; cursor: pointer; margin-bottom: 28px; }
        .task-card { background: rgba(255, 255, 255, 0.05); padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-dock { position: fixed; bottom: 0; left: 0; right: 0; background: #070f16; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 0; }
        .nav-item { text-align: center; color: #526882; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: #00f2fe; }
    </style>
</head>
<body>

    <div id="explore-screen" class="tab-content active">
        <div class="main-card">
            <div class="username" id="user-display">Loading...</div>
            <div>Current Balance</div>
            <div class="balance-amount" id="balance-display">Fetching...</div>
            <div style="display:flex; justify-content:space-between; margin-top:15px;">
                <span>Total Earned: <b id="total-earned">0</b></span>
                <span>Ads Watched: <b id="ads-count">0</b></span>
            </div>
        </div>

        <button class="ad-trigger-btn" id="watch-ad-btn" onclick="showRewardAd()">🎬 X-Ad Verification (₹5)</button>

        <h3>Tasks</h3>
        <div class="task-card">
            <div><b>Official Channel</b><br><span style="color:#00ffcc;">+₹10 Earn</span></div>
            <button onclick="verifyChannelJoin()" style="background:#00f2fe; border:none; padding:8px 12px; border-radius:8px; color:#000;">Join & Verify</button>
        </div>
    </div>

    <div id="missions-screen" class="tab-content"><h3>Missions Screen</h3></div>
    <div id="network-screen" class="tab-content"><h3>Network Screen</h3></div>
    <div id="vault-screen" class="tab-content"><h3>Vault Balance: <span id="vault-balance">₹0</span></h3></div>

    <div class="nav-dock">
        <div class="nav-item active" onclick="switchTab(this, 'explore-screen')">Explore</div>
        <div class="nav-item" onclick="switchTab(this, 'missions-screen')">Missions</div>
        <div class="nav-item" onclick="switchTab(this, 'network-screen')">Network</div>
        <div class="nav-item" onclick="switchTab(this, 'vault-screen')">Vault</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id.toString() : "12345678";
        document.getElementById("user-display").innerText = user ? '@'+user.username : "@Guest";
        
        const BACKEND_URL = "https://rozkamao-backend.onrender.com";
        let AdController = window.Adsgram?.init({ blockId: "38196" });

        function switchTab(el, tabId) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function loadUserBalance() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/user?user_id=${userId}`);
                const data = await res.json();
                if (data) {
                    document.getElementById("balance-display").innerText = "₹" + (data.balance || 0);
                    document.getElementById("vault-balance").innerText = "₹" + (data.balance || 0);
                    document.getElementById("total-earned").innerText = "₹" + (data.total_earned || 0);
                    document.getElementById("ads-count").innerText = data.ads_watched || 0;
                }
            } catch (e) { console.error(e); }
        }

        function showRewardAd() {
            if (!AdController) return alert("Ads not ready");
            AdController.show().then(async () => {
                const res = await fetch(`${BACKEND_URL}/api/user`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId, action: "watch_ad", amount: 5 })
                });
                const data = await res.json();
                if(data) loadUserBalance();
            }).catch(e => console.log(e));
        }

        async function verifyChannelJoin() {
            window.open('https://t.me/+OMk0KYuThopjZDFl', '_blank');
            setTimeout(async () => {
                const res = await fetch(`${BACKEND_URL}/api/user`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId, action: "join_channel", amount: 10 })
                });
                const data = await res.json();
                if(data.status === "success" || data.balance) {
                    alert("Channel Task Verified! ₹10 Added.");
                    loadUserBalance();
                } else {
                    alert(data.message || "Verification Failed!");
                }
            }, 5000);
        }

        loadUserBalance();
    </script>
</body>
    </html>
